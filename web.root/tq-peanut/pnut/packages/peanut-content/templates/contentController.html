<div class="modal" data-bind="attr: { id: saveModalId }"   data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">Save Changes</h4>
                <button type="button" class="close btn-close"
                        data-bs-dismiss="modal">
                        <!--  aria-label="Close" -->
                </button>
            </div>
            <div class="modal-body">
                <form>
                    <div  data-bind="visible: contentForm.contentId() === 0">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <span data-bind="visible: contentForm.titleError" class="text-danger">A title is required</span>
                        <input
                                type="text"
                                class="form-control"
                                id="title"
                                name="title"
                                placeholder="Enter title"
                                data-bind="value: contentForm.title"
                        >
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <input
                                type="text"
                                class="form-control"
                                id="description"
                                name="description"
                                placeholder="Enter a short description"
                                data-bind="value: contentForm.description"
                        >
                    </div>
                    </div>
                    <div class="mb-3" data-bind="visible: contentForm.contentId() !== 0">
                        <div><strong>Title</strong></div>
                        <div data-bind="text: contentForm.title"></div>
                    </div>

                    <div class="form-check mb-3" data-bind="visible: contentForm.contentId() === 0">
                        <input
                                type="checkbox"
                                class="form-check-input"
                                id="shared"
                                name="shared"
                                value="1"
                                data-bind="checked: contentForm.shared"
                        >
                        <label class="form-check-label" for="shared">
                            Shared
                        </label>
                    </div>
                    <div class="form-check mb-3" data-bind="visible: contentForm.contentId() !== 0">
                        <input
                                type="checkbox"
                                class="form-check-input"
                                id="newDocument"
                                name="newDocument"
                                value="1"
                                data-bind="checked: contentForm.contentId() === 0, event: { change: clearDocument }"
                        >
                        <label class="form-check-label" for="newDocument">
                            Save as new document
                        </label>
                    </div>

                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bind="click: doSave">
                    Save Changes
                </button>
                <button type="button" class="btn btn-outline-dark"  data-bind="click: cancelSave">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal" data-bind="attr: { id: fetchModalId }"
     data-bs-backdrop="static"  data-bs-keyboard="false"
>
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title" >Get Content</h4>
                <button type="button" class="close btn-close"
                        data-bs-dismiss="modal">
                        <!-- aria-label="Close" -->
                </button>
            </div>
            <div class="modal-body">
                <ul class="nav nav-tabs">

                    <li class="nav-item" data-bind="visible: (contentListForm.titles() || []).length > 0">
                        <a class="nav-link"
                           href="#"
                           data-bind="css:{active: contentListForm.tab()=='authors'}, click: showAuthorTab">
                            Your Content
                        </a>
                    </li>

                    <li class="nav-item" data-bind="visible: (contentListForm.shared() || []).length > 0">
                        <a class="nav-link"
                           href="#"
                           data-bind="css:{active: contentListForm.tab()=='shared'}, click: showSharedTab">
                            Shared Content
                        </a>
                    </li>

                    <li class="nav-item" data-bind="visible: (contentListForm.versions() || []).length > 0">
                        <a class="nav-link"
                           href="#"
                           data-bind="css:{active: contentListForm.tab()=='versions'}, click: showVersionsTab">
                            Versions
                        </a>
                    </li>
                </ul>
                <div data-bind="visible:contentListForm.tab()=='authors'"
                     class="border overflow-auto" style="max-height: 300px;"
                >
                    <!-- table class="table table-responsive" style="width: 100%" -->
                        <table class="table table-bordered mb-0">
                            <thead class="table-light sticky-top">
                        <tr>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Shared</th>
                            <th>Created</th>
                            <th>&nbsp;</th>
                        </tr>
                        </thead>
                        <tbody data-bind="foreach: contentListForm.titles">
                        <tr>
                            <td>
                                <a href="#" data-bind="text: title, click: $parent.loadContent"></a>
                            </td>
                            <td data-bind="text: description"></td>
                            <td data-bind="text: shared"></td>
                            <td data-bind="text: dateCreated"></td>
                            <td>
                                <a href="#" data-bind="click: $parent.deleteContent" title="Delete">
                                    <i class="fa-light fa-trash-can"></i>
                                    <!-- i class="fa-light fa-trash"></i -->
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div data-bind="visible:contentListForm.tab()=='shared'"
                     class="border overflow-auto" style="max-height: 300px;"
                >
                        <table class="table table-bordered mb-0">
                            <thead class="table-light sticky-top">
                            <tr>
                                <th>Title</th>
                                <th>Description</th>
                                <th>Author</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody data-bind="foreach: contentListForm.shared">
                            <tr>
                                <td>
                                    <a href="#" data-bind="text: title, click: $parent.loadContent"></a>
                                </td>
                                <td data-bind="text: description"></td>
                                <td data-bind="text: author"></td>
                                <td data-bind="text: dateCreated"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div data-bind="visible:contentListForm.tab()=='versions'">
                    <div class="mt-2 mb-1">
                        <p class="mb-1">Versions for <span data-bind="text: contentForm.title"></span></p>
                    </div>

                    <div class="border overflow-auto" style="max-height: 300px;">
                    <table class="table table-bordered mb-0">
                        <thead class="table-light sticky-top">

                            <tr>
                                <th>Added</th>
                            </tr>
                        </thead>
                        <tbody data-bind="foreach: contentListForm.versions">
                        <tr>
                            <td>
                                <a href="#" data-bind="text: dateCreated, click: $parent.loadVersion"></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                </div>
                <div data-bind="visible:contentListForm.tab()=='none'">
                    <p>No saved content available</p>
                </div>
            </div>
            <div class="modal-footer">
                <!-- Trigger button -->
                <button type="button" class="btn btn-outline-dark"
                        data-bind="visible: contentListForm.tab()=='versions', click: confirmClearVersions">
                    Clear Previous Versions
                </button>

                <button type="button" class="btn btn-outline-dark"  data-bs-dismiss="modal" data-dismiss="modal">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</div>


<!-- Confirm Modal -->
<div class="modal fade" id="confirm-modal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true"
     data-bs-backdrop="static" data-bs-keyboard="false"
>
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="confirmModalLabel">Please Confirm</h5>
                <button type="button" class="btn-close" data-bind="click:cancelConfirmModal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <p data-bind="text: confirmMessage"></p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bind="click:cancelConfirmModal">
                    No
                </button>
                <button type="button" class="btn btn-primary" id="confirmYesButton"
                data-bind="click:handleConfirmAction">
                    Yes
                </button>
            </div>

        </div>
    </div>
</div>
